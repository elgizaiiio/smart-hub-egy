  <body>
    <!-- iOS 26 Liquid Glass SVG Filters -->
    <svg style="display:none;position:absolute;width:0;height:0">
      <defs>
        <filter id="liquid-glass-distort" x="-10%" y="-10%" width="120%" height="120%">
          <feTurbulence type="fractalNoise" baseFrequency="0.008" numOctaves="2" seed="92" result="noise"/>
          <feGaussianBlur in="noise" stdDeviation="2" result="blurred"/>
          <feDisplacementMap in="SourceGraphic" in2="blurred" scale="6" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
        <filter id="liquid-glass-refract" x="-3%" y="-3%" width="106%" height="106%">
          <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="42" result="noise"/>
          <feGaussianBlur in="noise" stdDeviation="1.2" result="softNoise"/>
          <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
